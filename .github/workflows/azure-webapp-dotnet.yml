# Build Rodentia.Web and deploy to Azure App Service.
# Configure: repository variable AZURE_WEBAPP_NAME; secret AZURE_WEBAPP_PUBLISH_PROFILE (download Publish Profile from the Web App in Azure Portal).

name: Deploy Web App to Azure

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"
  PROJECT_PATH: Rodentia.Web/Rodentia.Web.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o "${{ github.workspace }}/publish" --no-restore

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "${{ github.workspace }}/publish"
